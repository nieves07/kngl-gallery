<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNGLRP | Resmi Galeri</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f0f12;
            --panel-color: #16161e;
            --accent-color: #e50914;
            --accent-hover: #b80710;
            --text-color: #ffffff;
            --text-muted: #a0a0b0;
            --border-color: #282836;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* Header */
        header {
            background: linear-gradient(180deg, rgba(22,22,30,1) 0%, rgba(15,15,18,0) 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header h1 span {
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* Ana Konteyner */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Butonlar Grubu */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #282836;
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #3b3b50;
        }

        .btn-danger {
            background-color: #d32f2f;
        }
        .btn-danger:hover {
            background-color: #b71c1c;
        }

        /* Yükleme Paneli (Admin) */
        .admin-panel {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 30px;
            display: none; /* Şifre girilince açılacak */
        }

        .panel-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Drag & Drop Alanı */
        .drop-zone {
            border: 2px dashed var(--accent-color);
            background-color: rgba(229, 9, 20, 0.03);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 20px;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            background-color: rgba(229, 9, 20, 0.1);
        }

        .drop-zone i {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        /* Inputlar */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px;
            border-radius: 5px;
            outline: none;
            font-size: 0.9rem;
        }

        .form-control:focus {
            border-color: var(--accent-color);
        }

        /* Galeri Izgarası (Grid) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .gallery-item {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .image-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
            background-color: #000;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Seçim Checkbox'ı */
        .select-checkbox {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            z-index: 10;
            accent-color: var(--accent-color);
            display: none; /* Toplu silme modu açılınca görünecek */
        }

        .item-details {
            padding: 15px;
        }

        .item-desc {
            font-size: 0.9rem;
            color: #fff;
            word-wrap: break-word;
            margin-bottom: 10px;
            min-height: 24px;
        }

        .item-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .item-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .btn-icon:hover {
            color: #d32f2f;
        }

        /* Modal (Şifre Girişi) */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .modal-content h3 {
            margin-bottom: 15px;
        }

        /* Bilgi Mesajı */
        .empty-message {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            padding: 50px 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1><span>KNGL</span>RP</h1>
        <p>Resmi Şehir Galerisi & Görsel Arşivi</p>
    </header>

    <div class="container">
        
        <div class="action-bar">
            <div>
                <button class="btn" id="loginBtn" onclick="openLoginModal()">
                    <i class="fa-solid fa-lock"></i> Yönetim Girişi
                </button>
                <button class="btn btn-secondary" id="logoutBtn" onclick="logoutAdmin()" style="display: none;">
                    <i class="fa-solid fa-lock-open"></i> Çıkış Yap
                </button>
            </div>
            
            <div id="bulkDeleteActions" style="display: none;">
                <button class="btn btn-secondary" onclick="toggleBulkSelectMode(false)">İptal</button>
                <button class="btn btn-danger" onclick="deleteSelectedImages()">
                    <i class="fa-solid fa-trash-can"></i> Seçilenleri Sil (<span id="selectCount">0</span>)
                </button>
            </div>

            <button class="btn btn-danger" id="bulkDeleteModeBtn" onclick="toggleBulkSelectMode(true)" style="display: none;">
                <i class="fa-solid fa-layer-group"></i> Toplu Silme Modu
            </button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <div class="panel-title">
                <span><i class="fa-solid fa-cloud-arrow-up"></i> Yeni Görsel Ekle</span>
            </div>

            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <i class="fa-solid fa-images"></i>
                <p>Görseli buraya sürükleyin veya <b>Göz Atın</b></p>
                <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
            </div>

            <div class="input-group">
                <label for="urlInput">Veya Görsel Linki (URL)</label>
                <input type="text" id="urlInput" class="form-control" placeholder="https://example.com/resim.png">
            </div>

            <div class="input-group">
                <label for="descInput">Görsel Açıklaması</label>
                <input type="text" id="descInput" class="form-control" placeholder="Şehir meydanından bir kare, pd baskını vb...">
            </div>

            <button class="btn" onclick="uploadImage()" style="width: 100%; justify-content: center;">
                <i class="fa-solid fa-plus"></i> Galeriyi Güncelle
            </button>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            </div>

    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h3>Yönetici Girişi</h3>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px;">Görsel eklemek veya silmek için şifreyi girin.</p>
            <div class="input-group">
                <input type="password" id="passwordInput" class="form-control" placeholder="Şifre">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-secondary" onclick="closeLoginModal()" style="flex: 1; justify-content: center;">İptal</button>
                <button class="btn" onclick="verifyPassword()" style="flex: 1; justify-content: center;">Giriş</button>
            </div>
        </div>
    </div>

    <script>
        // Sabit Şifre
        const ADMIN_PASSWORD = "nieves 1312";
        
        // State Yönetimi
        let isAdmin = false;
        let isBulkDeleteMode = false;
        let selectedItems = [];
        let galleryData = [];
        let tempBase64Image = ""; // Yüklenen yerel dosya verisi

        // Sayfa Yüklendiğinde Verileri Getir
        window.onload = function() {
            const storedData = localStorage.getItem('kngl_gallery');
            if(storedData) {
                galleryData = JSON.parse(storedData);
            }
            renderGallery();
            setupDragAndDrop();
        };

        // Drag & Drop Fonksiyonları
        function setupDragAndDrop() {
            const dropZone = document.getElementById('dropZone');

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    dropZone.classList.add('drag-over');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('drag-over');
                }, false);
            });

            dropZone.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                if(files.length > 0) {
                    processFile(files[0]);
                }
            });
        }

        function handleFileSelect(e) {
            const files = e.target.files;
            if(files.length > 0) {
                processFile(files[0]);
            }
        }

        function processFile(file) {
            if(!file.type.match('image.*')) {
                alert('Lütfen sadece görsel dosyası yükleyin!');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                tempBase64Image = e.target.result;
                document.getElementById('dropZone').innerHTML = `<i class="fa-solid fa-check" style="color: #4caf50;"></i><p>${file.name} hazır!</p>`;
            };
            reader.readAsDataURL(file);
        }

        // Giriş / Çıkış Modalları
        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('passwordInput').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('passwordInput').value = "";
        }

        function verifyPassword() {
            const pass = document.getElementById('passwordInput').value;
            if(pass === ADMIN_PASSWORD) {
                isAdmin = true;
                closeLoginModal();
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'inline-flex';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('bulkDeleteModeBtn').style.display = 'inline-flex';
                renderGallery(); // Silme ikonlarını göstermek için tekrar render
            } else {
                alert('Hatalı Şifre! Erişim Reddedildi.');
            }
        }

        function logoutAdmin() {
            isAdmin = false;
            toggleBulkSelectMode(false);
            document.getElementById('loginBtn').style.display = 'inline-flex';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('bulkDeleteModeBtn').style.display = 'none';
            renderGallery();
        }

        // Görsel Ekleme Fonksiyonu
        function uploadImage() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const descInput = document.getElementById('descInput').value.trim();
            
            let finalSrc = "";

            if(tempBase64Image) {
                finalSrc = tempBase64Image;
            } else if(urlInput) {
                finalSrc = urlInput;
            } else {
                alert('Lütfen bir dosya sürükleyin veya görsel linki yapıştırın!');
                return;
            }

            const newItem = {
                id: Date.now(),
                src: finalSrc,
                description: descInput || "Açıklama belirtilmedi.",
                date: new Date().toLocaleDateString('tr-TR', { hour: '2-digit', minute:'2-digit' })
            };

            galleryData.unshift(newItem);
            localStorage.setItem('kngl_gallery', JSON.stringify(galleryData));
            
            // Formu Temizle
            document.getElementById('urlInput').value = "";
            document.getElementById('descInput').value = "";
            tempBase64Image = "";
            document.getElementById('dropZone').innerHTML = `<i class="fa-solid fa-images"></i><p>Görseli buraya sürükleyin veya <b>Göz Atın</b></p>`;

            renderGallery();
        }

        // Galeriyi Ekrana Basma
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = "";

            if(galleryData.length === 0) {
                grid.innerHTML = `<div class="empty-message">Galeri henüz boş. Sunucudan görseller yüklenmesini bekleyin.</div>`;
                return;
            }

            galleryData.forEach(item => {
                const isChecked = selectedItems.includes(item.id);

                const itemHtml = `
                    <div class="gallery-item" id="item-${item.id}">
                        <input type="checkbox" class="select-checkbox" 
                            style="display: ${isBulkDeleteMode ? 'block' : 'none'}" 
                            ${isChecked ? 'checked' : ''} 
                            onchange="handleSelectItem(${item.id})">
                        
                        <div class="image-container">
                            <img src="${item.src}" alt="KNGLRP" onerror="this.src='https://placehold.co/600400/16161e/ffffff?text=Hatalı+Görsel+Linki'">
                        </div>
                        <div class="item-details">
                            <p class="item-desc">${item.description}</p>
                            <span class="item-date"><i class="fa-regular fa-clock"></i> ${item.date}</span>
                            
                            ${isAdmin && !isBulkDeleteMode ? `
                                <div class="item-actions">
                                    <button class="btn-icon" onclick="deleteSingleImage(${item.id})" title="Görseli Sil">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        // Tekli Silme
        function deleteSingleImage(id) {
            if(confirm('Bu görseli silmek istediğinize emin misiniz?')) {
                galleryData = galleryData.filter(item => item.id !== id);
                localStorage.setItem('kngl_gallery', JSON.stringify(galleryData));
                renderGallery();
            }
        }

        // Toplu Silme Modu Geçişleri
        function toggleBulkSelectMode(activate) {
            isBulkDeleteMode = activate;
            selectedItems = [];
            document.getElementById('selectCount').innerText = "0";

            if(activate) {
                document.getElementById('bulkDeleteModeBtn').style.display = 'none';
                document.getElementById('bulkDeleteActions').style.display = 'flex';
            } else {
                document.getElementById('bulkDeleteModeBtn').style.display = 'inline-flex';
                document.getElementById('bulkDeleteActions').style.display = 'none';
            }
            renderGallery();
        }

        // Öğe Seçimi
        function handleSelectItem(id) {
            if(selectedItems.includes(id)) {
                selectedItems = selectedItems.filter(item => item !== id);
            } else {
                selectedItems.push(id);
            }
            document.getElementById('selectCount').innerText = selectedItems.length;
        }

        // Seçilenleri Toplu Silme işlemi
        function deleteSelectedImages() {
            if(selectedItems.length === 0) {
                alert('Lütfen silmek için önce görsel seçin.');
                return;
            }

            if(confirm(`${selectedItems.length} adet görseli toplu olarak silmek istediğinize emin misiniz?`)) {
                galleryData = galleryData.filter(item => !selectedItems.includes(item.id));
                localStorage.setItem('kngl_gallery', JSON.stringify(galleryData));
                toggleBulkSelectMode(false);
            }
        }
    </script>
</body>
</html>
